<div class="row">
    <div class="col-md-6">
        <app-todo-form
        (emitUpdatedTodo)="getUpdATEDtODO($event)"
        [getEditTodo]="editObj"
        (emitNewTodo)="getNewTodo($event)"
        ></app-todo-form>
    </div>
    <div class="col-md-6 mt-4 mt-md-0">
        <app-todo-list
        (emitEditTodo)="getEditTodo($event)"
        (emitRemoveID)="getRemoveID($event)"
        [getTodosArr]="todosArr"
        ></app-todo-list>
    </div>
</div>
